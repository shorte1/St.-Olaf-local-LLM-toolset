<!DOCTYPE html>
<html>
<head>
    <title>LLM Interface</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f5f5f5;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        h1 { color: #333; margin: 0; }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            color: #666;
            font-size: 14px;
        }
        a {
            color: #007bff;
            text-decoration: none;
            font-size: 14px;
        }
        a:hover { text-decoration: underline; }
        #conversation {
            background: white;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 20px;
            min-height: 300px;
            max-height: 500px;
            overflow-y: auto;
            margin-bottom: 20px;
        }
        .message {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .message:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        .message-role {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .user-role { color: #007bff; }
        .assistant-role { color: #28a745; }
        .message-content {
            white-space: pre-wrap;
            line-height: 1.5;
        }
        #prompt {
            width: 100%;
            height: 100px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
            box-sizing: border-box;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        #submit {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        #submit:hover { background: #0056b3; }
        #submit:disabled { background: #aaa; cursor: not-allowed; }
        #clear {
            padding: 10px 20px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        #clear:hover { background: #b02a37; }
        #status {
            margin-top: 10px;
            color: #666;
            font-style: italic;
            font-size: 14px;
        }
        .empty-state {
            color: #999;
            text-align: center;
            padding: 40px 0;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>LLM Interface</h1>
        <div class="user-info">
            <span>{{ email }}</span>
            <a href="/logout">Logout</a>
        </div>
    </div>

    <div id="conversation">
        <div class="empty-state" id="empty-state">
            No messages yet. Start a conversation below.
        </div>
    </div>

    <textarea id="prompt" placeholder="Enter your prompt here... (Ctrl+Enter to submit)"></textarea>
    <div class="controls">
        <button id="submit" onclick="sendPrompt()">Submit</button>
        <button id="clear" onclick="clearConversation()">New Conversation</button>
    </div>
    <div id="status"></div>

    <script>
        // Load conversation history on page load
        window.onload = async function() {
            const res = await fetch('/history');
            const messages = await res.json();
            
            if (messages.length > 0) {
                document.getElementById('empty-state').style.display = 'none';
                messages.forEach(msg => appendMessage(msg.role, msg.content));
                scrollToBottom();
            }

            // Attach Ctrl+Enter listener only on this page
            const promptEl = document.getElementById('prompt');
            if (promptEl) {
                promptEl.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' && e.ctrlKey) {
                        e.preventDefault();
                        sendPrompt();
                    }
                });
            }
        }

        function appendMessage(role, content) {
            const emptyState = document.getElementById('empty-state');
            if (emptyState) emptyState.style.display = 'none';

            const conversation = document.getElementById('conversation');
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `
                <div class="message-role ${role}-role">
                    ${role === 'user' ? 'You' : 'Assistant'}
                </div>
                <div class="message-content"></div>
            `;
            conversation.appendChild(div);
            div.querySelector('.message-content').textContent = content;
            return div.querySelector('.message-content');
        }

        function scrollToBottom() {
            const conversation = document.getElementById('conversation');
            conversation.scrollTop = conversation.scrollHeight;
        }

        async function sendPrompt() {
            const promptEl = document.getElementById('prompt');
            const prompt = promptEl.value.trim();
            const statusDiv = document.getElementById('status');
            const submit = document.getElementById('submit');

            if (!prompt) return;

            submit.disabled = true;
            statusDiv.textContent = 'Thinking...';
            statusDiv.style.color = '#666';

            appendMessage('user', prompt);
            promptEl.value = '';
            scrollToBottom();

            const assistantContent = appendMessage('assistant', '');
            scrollToBottom();

            try {
                const response = await fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                if (response.status === 401) {
                    window.location.href = '/login';
                    return;
                }

                if (response.status === 503) {
                    assistantContent.textContent = 'Error: Ollama is not running';
                    return;
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullResponse = '';
                let firstToken = true;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    if (firstToken) {
                        statusDiv.textContent = '';
                        firstToken = false;
                    }
                    fullResponse += decoder.decode(value);
                    assistantContent.textContent = fullResponse;
                    scrollToBottom();
                }

            } catch (error) {
                assistantContent.textContent = 'Error: ' + error.message;
                statusDiv.style.color = 'red';
            } finally {
                statusDiv.textContent = '';
                submit.disabled = false;
            }
        }

        async function clearConversation() {
            if (!confirm('Start a new conversation? Your history will be preserved but a new chat will begin.')) return;
            await fetch('/clear', { method: 'POST' });
            const conversation = document.getElementById('conversation');
            conversation.innerHTML = '<div class="empty-state" id="empty-state">No messages yet. Start a conversation below.</div>';
        }
    </script>
</body>
</html>
